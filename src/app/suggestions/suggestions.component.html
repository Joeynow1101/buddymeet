<app-profile-row [canFollow]="false"></app-profile-row>
<div class="text margin-b">
  <b>Buddy suggestions</b>
</div>

@for (suggestion of suggestions; track suggestion.name) {
  <app-profile-row
    [name]="suggestion.name"
    [gender]="suggestion.gender"
    [img]="suggestion.image"
  ></app-profile-row>
}
